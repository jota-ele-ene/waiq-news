name: 📬 Newsletter Mensual

on:
  schedule:
    # Se ejecuta cada viernes; el job check-friday decide si es el primero del mes
    - cron: "0 11 * * 5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no envía, solo muestra el resultado)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      force:
        description: "Forzar envío aunque no sea el primer viernes"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  check-first-friday:
    name: Comprobar si es el primer viernes del mes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}

    steps:
      - id: check
        name: Verificar primer viernes del mes
        run: |
          DAY=$(date +%d)
          FORCED="${{ github.event.inputs.force }}"
          echo "Día del mes: $DAY"

          if [[ "$FORCED" == "true" ]]; then
            echo "⚡ Forzado manualmente."
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif (( DAY <= 7 )); then
            echo "✅ Día $DAY ≤ 7 → es el primer viernes del mes."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️  Día $DAY > 7 → no es el primer viernes del mes."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  send-monthly:
    name: Enviar newsletter mensual
    needs: check-first-friday
    if: needs.check-first-friday.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout waiq-news
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install requests pyyaml

      - name: Enviar newsletter
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
          MAILERLITE_GROUP_ID: ${{ secrets.MAILERLITE_GROUP_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MODE: "digest"
          DAYS_BACK: "31"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python .github/scripts/send_newsletter.py
