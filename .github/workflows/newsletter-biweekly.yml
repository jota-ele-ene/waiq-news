name: 📬 Newsletter Quincenal

on:
  schedule:
    - cron: "0 11 * * 5"
  workflow_dispatch:
    inputs:
      lang:
        description: "Idioma"
        required: false
        default: "es"
        type: choice
        options: ["es", "en"]
      dry_run:
        description: "Dry run (no envía)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      force:
        description: "Forzar aunque no sea semana par"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  check-week:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          WEEK=$(date +%V)
          FORCED="${{ github.event.inputs.force }}"
          if [[ "$FORCED" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif (( WEEK % 2 == 0 )); then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  send-biweekly:
    needs: check-week
    if: needs.check-week.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Enviar newsletter quincenal
        env:
          BREVO_API_KEY:              ${{ secrets.BREVO_API_KEY }}
          BREVO_LIST_ID:              ${{ secrets.BREVO_LIST_ID }}
          BREVO_TEMPLATE_ID:          ${{ secrets.BREVO_TEMPLATE_ID }}
          FROM_NAME:                  ${{ secrets.FROM_NAME }}
          FROM_EMAIL:                 ${{ secrets.FROM_EMAIL }}
          HUGO_SINGLE_ENDPOINT_ES:    ${{ secrets.HUGO_SINGLE_ENDPOINT_ES }}
          HUGO_SINGLE_ENDPOINT_EN:    ${{ secrets.HUGO_SINGLE_ENDPOINT_EN }}
          HUGO_DIGEST_ENDPOINT_ES:    ${{ secrets.HUGO_DIGEST_ENDPOINT_ES }}
          HUGO_DIGEST_ENDPOINT_EN:    ${{ secrets.HUGO_DIGEST_ENDPOINT_EN }}
          SITE_BASE_URL:              ${{ secrets.SITE_BASE_URL }}
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          MODE:    digest
          LANG:    ${{ github.event.inputs.lang || 'es' }}
          DAYS:    "15"
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: python main.py
